<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
</head>
<body>
    <h1>Simple Chatbot</h1>
    
    <form method="POST" action="/">
        <input type="text" name="message" size="60" required autofocus>
        <button type="submit">Send</button>
    </form>
    
    {% if last_message %}
        <hr>
        <p><strong>You:</strong> {{ last_message }}</p>
    {% endif %}
    
    {% if response %}
        <p><strong>Bot:</strong> {{ response }}</p>
    {% endif %}
</body>
</html>
